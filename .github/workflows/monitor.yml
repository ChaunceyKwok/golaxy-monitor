name: Golaxy Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Restore state
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: .golaxy_seen.json
          key: golaxy-state-v1

      - name: Run monitor
        run: python3 monitor.py
        env:
          GOLAXY_API_KEY: ${{ secrets.GOLAXY_API_KEY }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}

      - name: Save state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .golaxy_seen.json
          key: golaxy-state-v1-${{ github.run_id }}
